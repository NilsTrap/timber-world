<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- White circle background -->
  <circle cx="32" cy="32" r="32" fill="white"/>
  <!-- Bold black T on top -->
  <text x="32" y="28" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="30" fill="black">T</text>
  <!-- Thin red line in the middle -->
  <line x1="14" y1="32" x2="50" y2="32" stroke="#DC2626" stroke-width="2"/>
  <!-- Black I below -->
  <text x="32" y="54" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="24" fill="black">I</text>
</svg>
